name: Update Airport Status Data

on:
  schedule:
    - cron: "0 * * * *" # Every hour, on the hour
  workflow_dispatch: {} # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch airport data from AeroAPI
        run: node scripts/fetch-data.mjs
        env:
          FLIGHTAWARE_API_KEY: ${{ secrets.FLIGHTAWARE_API_KEY }}

      - name: Commit & push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/status.json
          git diff --cached --quiet || git commit -m "chore: update airport status data [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
          git push
